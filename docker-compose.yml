
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banwa_php
    network_mode: "host"
    volumes:
      - ./:/var/www/html/Banwa
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"

  db:
    image: postgres:18
    container_name: banwa_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 080702
      POSTGRES_DB: capstone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
