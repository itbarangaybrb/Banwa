<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Boundary — Barangay Blue Ridge B</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:"Inter",Arial,sans-serif; background:#f4f6fb; color:#333; height:100vh; display:flex; flex-direction:column; }

        .topbar {
            background:#00247c; color:#fff;
            padding:0 22px; height:56px; flex-shrink:0;
            display:flex; align-items:center; justify-content:space-between;
            box-shadow:0 2px 8px rgba(0,0,0,0.18); z-index:200;
        }
        .topbar h1 { font-size:16px; font-weight:700; display:flex; align-items:center; gap:9px; }
        .topbar-right { display:flex; gap:9px; }

        .btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:7px 15px; border:none; border-radius:7px;
            font-size:13px; font-weight:600; cursor:pointer;
            font-family:inherit; transition:all .18s;
        }
        .btn-primary { background:#00247c; color:#fff; }
        .btn-primary:hover { background:#001a5c; }
        .btn-success { background:#28a745; color:#fff; }
        .btn-success:hover { background:#1e7e34; }
        .btn-warning { background:#ff9800; color:#fff; }
        .btn-warning:hover { background:#e65100; }
        .btn-danger  { background:#dc3545; color:#fff; }
        .btn-danger:hover  { background:#b02a37; }
        .btn-outline { background:#fff; color:#00247c; border:1.5px solid #00247c; }
        .btn-outline:hover { background:#f0f4ff; }
        .btn-sm { padding:5px 11px; font-size:12px; border-radius:5px; }
        .btn:disabled { opacity:.5; cursor:not-allowed; }

        /* ── Main split layout ── */
        .main { display:flex; flex:1; overflow:hidden; }

        /* ── Sidebar ── */
        .sidebar {
            width:360px; flex-shrink:0;
            background:#fff; display:flex; flex-direction:column;
            border-right:1px solid #e8ecf4; overflow-y:auto;
        }
        .sidebar-section { padding:16px 18px; border-bottom:1px solid #f0f0f0; }
        .sidebar-section h3 {
            font-size:12px; font-weight:700; color:#00247c;
            text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px;
        }

        .form-group { margin-bottom:13px; }
        .form-group label {
            display:block; margin-bottom:5px;
            font-size:11px; font-weight:700; color:#666;
            text-transform:uppercase; letter-spacing:.4px;
        }
        .form-group input, .form-group textarea {
            width:100%; padding:8px 11px;
            border:1.5px solid #e0e0e0; border-radius:7px;
            font-size:13px; font-family:inherit; outline:none; transition:border-color .18s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color:#00247c; }
        .form-group textarea { resize:vertical; min-height:60px; font-size:12px; }

        /* Drawing controls */
        .draw-controls { display:flex; flex-direction:column; gap:7px; }
        .draw-controls .btn { justify-content:center; }

        /* Point count display */
        .point-info {
            background:#f0f4ff; border:1px solid #c7d8ff;
            border-radius:7px; padding:10px 13px;
            font-size:12px; color:#00247c; margin-top:8px;
            display:flex; align-items:center; gap:8px;
        }
        .point-info span { font-weight:700; font-size:16px; }

        /* Boundary list */
        .boundary-item {
            border:1.5px solid #e8ecf4; border-radius:8px;
            padding:11px 13px; margin-bottom:8px; cursor:pointer;
            transition:all .18s; position:relative;
        }
        .boundary-item:hover { border-color:#00247c; background:#f7f9ff; }
        .boundary-item.active { border-color:#00247c; background:#eef2ff; }
        .boundary-item h4 { font-size:13px; font-weight:700; color:#00247c; margin-bottom:3px; }
        .boundary-item p  { font-size:11px; color:#888; }
        .boundary-item .item-actions {
            position:absolute; right:10px; top:50%; transform:translateY(-50%);
            display:flex; gap:5px;
        }
        .empty-list { text-align:center; padding:24px; color:#bbb; font-size:13px; }

        /* Status badge */
        .badge {
            display:inline-block; padding:2px 8px; border-radius:10px;
            font-size:10px; font-weight:700; text-transform:uppercase;
        }
        .badge-active { background:#d4edda; color:#155724; }
        .badge-inactive { background:#f8d7da; color:#721c24; }

        /* ── Map ── */
        .map-wrap { flex:1; position:relative; }
        #map { width:100%; height:100%; }

        /* Map overlay hint */
        .map-hint {
            position:absolute; top:14px; left:50%; transform:translateX(-50%);
            background:rgba(0,36,124,0.88); color:#fff;
            padding:8px 18px; border-radius:20px;
            font-size:12px; font-weight:600; z-index:1000;
            pointer-events:none; white-space:nowrap;
            display:none;
        }
        .map-hint.show { display:block; }

        /* Point counter on map */
        .map-point-counter {
            position:absolute; bottom:18px; right:14px;
            background:rgba(0,36,124,0.85); color:#fff;
            padding:7px 14px; border-radius:20px;
            font-size:12px; font-weight:700; z-index:1000;
            display:none;
        }

        /* Toast */
        #toast {
            position:fixed; bottom:24px; left:50%;
            transform:translateX(-50%) translateY(40px);
            background:#333; color:#fff; padding:10px 20px; border-radius:8px;
            font-size:13px; font-weight:500; opacity:0;
            transition:opacity .25s, transform .25s;
            z-index:9999; pointer-events:none; white-space:nowrap;
        }
        #toast.show    { opacity:1; transform:translateX(-50%) translateY(0); }
        #toast.success { background:#28a745; }
        #toast.error   { background:#dc3545; }

        /* Confirm overlay */
        .confirm-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.45); z-index:1100;
            align-items:center; justify-content:center;
        }
        .confirm-overlay.open { display:flex; }
        .confirm-box {
            background:#fff; border-radius:12px; padding:28px;
            width:92%; max-width:360px;
            box-shadow:0 12px 40px rgba(0,0,0,0.2); text-align:center;
        }
        .confirm-box .icon { font-size:34px; margin-bottom:12px; }
        .confirm-box h3 { font-size:16px; margin-bottom:6px; }
        .confirm-box p  { font-size:13px; color:#777; margin-bottom:20px; }
        .confirm-btns   { display:flex; gap:10px; justify-content:center; }

        /* Undo button */
        #undoBtn { background:#6c757d; color:#fff; }
        #undoBtn:hover { background:#5a6268; }

        /* House polygon layer */
        .btn-outline.active-toggle { background:#00247c; color:#fff; border-color:#00247c; }
        .house-popup h4 { font-size:13px; font-weight:700; color:#00247c; margin-bottom:5px; }
        .house-popup p  { font-size:12px; color:#555; margin:2px 0; }
    </style>
</head>
<body>

<div class="topbar">
    <h1><i class="fas fa-draw-polygon"></i> Manage Boundary — Barangay Blue Ridge B</h1>
    <div class="topbar-right">
        <button class="btn btn-outline" id="toggleHousesBtn" onclick="toggleHousePolygons()">
            <i class="fas fa-home"></i> Show Houses
        </button>
        <button class="btn btn-outline" onclick="loadBoundaries()">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>
</div>

<div class="main">
    <!-- ── Sidebar ── -->
    <div class="sidebar">

        <!-- Draw new boundary -->
        <div class="sidebar-section">
            <h3><i class="fas fa-plus-circle"></i> Draw New Boundary</h3>

            <div class="form-group">
                <label>Name *</label>
                <input type="text" id="newName" placeholder="e.g. Barangay Blue Ridge B">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="newDesc" placeholder="Optional description…"></textarea>
            </div>

            <div class="draw-controls">
                <button class="btn btn-success" id="startBtn" onclick="startDrawing()">
                    <i class="fas fa-pencil-alt"></i> Start Drawing
                </button>
                <button class="btn" id="undoBtn" onclick="undoPoint()" disabled>
                    <i class="fas fa-undo"></i> Undo Last Point
                </button>
                <button class="btn btn-danger" id="clearBtn" onclick="clearDrawing()" disabled>
                    <i class="fas fa-times"></i> Clear All
                </button>
            </div>

            <div class="point-info" id="pointInfo" style="display:none;">
                <i class="fas fa-map-marker-alt" style="color:#00247c;"></i>
                <span id="pointCount">0</span> points drawn
                <span id="readyMsg" style="margin-left:auto;color:#28a745;display:none;">
                    <i class="fas fa-check"></i> Ready to save
                </span>
            </div>

            <div style="margin-top:12px;">
                <button class="btn btn-primary" id="saveBtn" onclick="saveBoundary()" disabled style="width:100%;justify-content:center;padding:10px;">
                    <i class="fas fa-save"></i> Save Boundary
                </button>
            </div>
        </div>

        <!-- Existing boundaries list -->
        <div class="sidebar-section" style="flex:1;">
            <h3><i class="fas fa-list"></i> Saved Boundaries</h3>
            <div id="boundaryList">
                <div class="empty-list"><i class="fas fa-spinner fa-spin"></i> Loading…</div>
            </div>
        </div>

    </div>

    <!-- ── Map ── -->
    <div class="map-wrap">
        <div id="map"></div>
        <div class="map-hint" id="mapHint">
            Click on the map to add boundary points — need at least 3
        </div>
        <div class="map-point-counter" id="mapCounter">
            <i class="fas fa-map-marker-alt"></i> <span id="mapPointCount">0</span> pts
        </div>
    </div>
</div>

<!-- Delete confirm -->
<div class="confirm-overlay" id="deleteOverlay">
    <div class="confirm-box">
        <div class="icon">🗑️</div>
        <h3>Delete Boundary?</h3>
        <p id="deleteMsg">This cannot be undone.</p>
        <div class="confirm-btns">
            <button class="btn btn-outline" onclick="closeDelete()">Cancel</button>
            <button class="btn btn-danger" onclick="confirmDelete()">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const HANDLER = '../../../server/handlers/map/map_handler.php';

// ── Map setup ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([14.618, 121.076], 16);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri', maxNativeZoom: 19, maxZoom: 22
}).addTo(map);

// ── State ─────────────────────────────────────────────────────────────────────
let isDrawing      = false;
let drawPoints     = [];       // [lat, lng] array
let drawMarkers    = [];
let drawPolyline   = null;
let drawPolygon    = null;
let savedLayers    = {};       // boundary_id → leaflet layer
let allBoundaries  = [];
let deleteTarget   = null;
let highlightedId  = null;

// House polygons
let houseLayer        = L.layerGroup();
let housesVisible     = false;
let housesLoaded      = false;

// ── Boot ──────────────────────────────────────────────────────────────────────
loadBoundaries();

// ── Load & display all saved boundaries ──────────────────────────────────────
async function loadBoundaries() {
    document.getElementById('boundaryList').innerHTML =
        '<div class="empty-list"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';

    // Clear existing layers
    Object.values(savedLayers).forEach(l => map.removeLayer(l));
    savedLayers = {};

    try {
        const fd = new FormData();
        fd.append('action', 'get_boundaries');
        const res  = await fetch(HANDLER, { method:'POST', body:fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to load');

        allBoundaries = data.boundaries || [];
        renderList();
        allBoundaries.forEach(b => drawSavedBoundary(b));
        toast(`Loaded ${allBoundaries.length} boundary record(s)`, 'success');
    } catch(e) {
        document.getElementById('boundaryList').innerHTML =
            `<div class="empty-list"><i class="fas fa-exclamation-circle"></i> ${esc(e.message)}</div>`;
        toast(e.message, 'error');
    }
}

function renderList() {
    if (!allBoundaries.length) {
        document.getElementById('boundaryList').innerHTML =
            '<div class="empty-list">No boundaries saved yet.<br>Draw one on the map!</div>';
        return;
    }
    document.getElementById('boundaryList').innerHTML = allBoundaries.map(b => {
        const pts  = parseCoords(b.coordinates).length;
        const date = b.created_at ? new Date(b.created_at).toLocaleDateString('en-PH') : '—';
        return `
        <div class="boundary-item" id="item-${b.boundary_id}" onclick="focusBoundary(${b.boundary_id})">
            <h4>${esc(b.name)}</h4>
            <p>${pts} points &bull; ${date}
               ${b.description ? ' &bull; ' + esc(b.description).substring(0, 40) : ''}
            </p>
            <div class="item-actions">
                <button class="btn btn-danger btn-sm"
                    onclick="event.stopPropagation();openDelete(${b.boundary_id},'${esc(b.name).replace(/'/g,"\\'")}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>`;
    }).join('');
}

function drawSavedBoundary(b) {
    const coords = parseCoords(b.coordinates);
    if (coords.length < 3) return;
    const latLngs = coords.map(c => [c[1], c[0]]); // [lng,lat] → [lat,lng]
    const layer = L.polygon(latLngs, {
        color: '#00247C', weight: 3,
        fillColor: '#667eea', fillOpacity: 0.12,
        dashArray: '6,5'
    }).addTo(map);
    layer.bindPopup(`<strong>${b.name}</strong><br>${coords.length} points`);
    savedLayers[b.boundary_id] = layer;
}

function focusBoundary(id) {
    // Highlight in list
    document.querySelectorAll('.boundary-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById('item-' + id);
    if (item) item.classList.add('active');

    // Highlight on map
    Object.entries(savedLayers).forEach(([bid, layer]) => {
        layer.setStyle(parseInt(bid) === id
            ? { color:'#ff9800', weight:4, fillOpacity:0.22 }
            : { color:'#00247C', weight:3, fillOpacity:0.12, dashArray:'6,5' }
        );
    });

    if (savedLayers[id]) {
        map.fitBounds(savedLayers[id].getBounds(), { padding:[30,30] });
    }
}

// ── House polygons ────────────────────────────────────────────────────────────
async function toggleHousePolygons() {
    const btn = document.getElementById('toggleHousesBtn');

    if (housesVisible) {
        // Hide
        map.removeLayer(houseLayer);
        housesVisible = false;
        btn.innerHTML = '<i class="fas fa-home"></i> Show Houses';
        btn.classList.remove('active-toggle');
        return;
    }

    // Load if first time
    if (!housesLoaded) {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading…';
        btn.disabled  = true;
        try {
            const fd = new FormData();
            fd.append('action', 'get_houses');
            const res  = await fetch(HANDLER, { method:'POST', body:fd });
            const data = await res.json();
            if (!data.success) throw new Error(data.message || 'Failed to load houses');

            houseLayer.clearLayers();
            (data.houses || []).forEach(h => {
                if (!h.coordinates) return;
                const coords = parseCoords(h.coordinates);
                if (coords.length < 3) return;
                // coords are [lng, lat] — convert to Leaflet [lat, lng]
                const latLngs = coords.map(c => [c[1], c[0]]);
                const poly = L.polygon(latLngs, {
                    color: '#ffffff',
                    weight: 1.5,
                    fillColor: '#4fc3f7',
                    fillOpacity: 0.35
                });
                poly.bindPopup(`
                    <div class="house-popup">
                        <h4>${esc(h.address || 'No address')}</h4>
                        <p><strong>Street:</strong> ${esc(h.street_name || '—')}</p>
                        <p><strong>House #:</strong> ${esc(h.house_number || '—')}</p>
                        <p><strong>Area:</strong> ${h.area_sqm ? parseFloat(h.area_sqm).toFixed(2) + ' m²' : '—'}</p>
                    </div>
                `);
                houseLayer.addLayer(poly);
            });

            housesLoaded = true;
            toast(`Loaded ${data.houses.length} house polygons`, 'success');
        } catch(e) {
            toast(e.message, 'error');
            btn.innerHTML = '<i class="fas fa-home"></i> Show Houses';
            btn.disabled  = false;
            return;
        }
        btn.disabled = false;
    }

    // Show
    houseLayer.addTo(map);
    housesVisible = true;
    btn.innerHTML = '<i class="fas fa-home"></i> Hide Houses';
    btn.classList.add('active-toggle');
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function startDrawing() {
    if (isDrawing) {
        stopDrawing();
        return;
    }
    isDrawing = true;
    document.getElementById('startBtn').innerHTML = '<i class="fas fa-stop"></i> Stop Drawing';
    document.getElementById('startBtn').className = 'btn btn-danger';
    document.getElementById('mapHint').classList.add('show');
    document.getElementById('pointInfo').style.display = 'flex';
    document.getElementById('mapCounter').style.display = 'block';
    document.getElementById('undoBtn').disabled = false;
    document.getElementById('clearBtn').disabled = false;
    map.on('click', onMapClick);
    map.getContainer().style.cursor = 'crosshair';
}

function stopDrawing() {
    isDrawing = false;
    document.getElementById('startBtn').innerHTML = '<i class="fas fa-pencil-alt"></i> Start Drawing';
    document.getElementById('startBtn').className = 'btn btn-success';
    document.getElementById('mapHint').classList.remove('show');
    map.off('click', onMapClick);
    map.getContainer().style.cursor = '';
}

function onMapClick(e) {
    const { lat, lng } = e.latlng;
    drawPoints.push([lat, lng]);

    // Dot marker
    const m = L.circleMarker([lat, lng], {
        radius:5, fillColor:'#ff5722', color:'#fff', weight:2, fillOpacity:1
    }).addTo(map);
    m.bindTooltip(`${drawPoints.length}`, { permanent:true, direction:'top', offset:[0,-8],
        className:'leaflet-tooltip' });
    drawMarkers.push(m);

    redrawPreview();
    updatePointUI();
}

function redrawPreview() {
    if (drawPolyline) map.removeLayer(drawPolyline);
    if (drawPolygon)  map.removeLayer(drawPolygon);

    if (drawPoints.length < 2) return;

    if (drawPoints.length >= 3) {
        drawPolygon = L.polygon(drawPoints, {
            color:'#ff5722', weight:2.5, fillColor:'#ff5722', fillOpacity:0.18
        }).addTo(map);
    } else {
        drawPolyline = L.polyline(drawPoints, { color:'#ff5722', weight:2.5 }).addTo(map);
    }
}

function undoPoint() {
    if (!drawPoints.length) return;
    drawPoints.pop();
    const m = drawMarkers.pop();
    if (m) map.removeLayer(m);
    redrawPreview();
    updatePointUI();
}

function clearDrawing() {
    drawPoints = [];
    drawMarkers.forEach(m => map.removeLayer(m));
    drawMarkers = [];
    if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
    if (drawPolygon)  { map.removeLayer(drawPolygon);  drawPolygon  = null; }
    updatePointUI();
}

function updatePointUI() {
    const n = drawPoints.length;
    document.getElementById('pointCount').textContent    = n;
    document.getElementById('mapPointCount').textContent = n;
    document.getElementById('readyMsg').style.display    = n >= 3 ? 'inline' : 'none';
    document.getElementById('saveBtn').disabled          = n < 3;
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveBoundary() {
    const name = document.getElementById('newName').value.trim();
    const desc = document.getElementById('newDesc').value.trim();

    if (!name)              { toast('Name is required', 'error'); return; }
    if (drawPoints.length < 3) { toast('Draw at least 3 points first', 'error'); return; }

    // Store as [lng, lat] to match house_polygons convention
    const coords = drawPoints.map(p => [p[1], p[0]]);

    const fd = new FormData();
    fd.append('action',      'save_boundary');
    fd.append('name',        name);
    fd.append('description', desc);
    fd.append('coordinates', JSON.stringify(coords));

    try {
        const res  = await fetch(HANDLER, { method:'POST', body:fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        toast('Boundary saved!', 'success');
        stopDrawing();
        clearDrawing();
        document.getElementById('newName').value = '';
        document.getElementById('newDesc').value = '';
        document.getElementById('pointInfo').style.display = 'none';
        document.getElementById('saveBtn').disabled = true;
        loadBoundaries();
    } catch(e) { toast(e.message, 'error'); }
}

// ── Delete ────────────────────────────────────────────────────────────────────
function openDelete(id, name) {
    deleteTarget = id;
    document.getElementById('deleteMsg').textContent = `Delete "${name}"? This cannot be undone.`;
    document.getElementById('deleteOverlay').classList.add('open');
}
function closeDelete() {
    deleteTarget = null;
    document.getElementById('deleteOverlay').classList.remove('open');
}
async function confirmDelete() {
    if (!deleteTarget) return;
    const fd = new FormData();
    fd.append('action',      'delete_boundary');
    fd.append('boundary_id', deleteTarget);
    try {
        const res  = await fetch(HANDLER, { method:'POST', body:fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        closeDelete();
        toast('Boundary deleted', 'success');
        loadBoundaries();
    } catch(e) { toast(e.message, 'error'); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function parseCoords(raw) {
    try { return typeof raw === 'string' ? JSON.parse(raw) : raw; }
    catch(e) { return []; }
}
function esc(s) {
    return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}

document.getElementById('deleteOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDelete();
});
</script>
</body>
</html>
