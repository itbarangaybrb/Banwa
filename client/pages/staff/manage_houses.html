<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Houses — Barangay Blue Ridge B</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:"Inter",Arial,sans-serif; background:#f4f6fb; color:#333; min-height:100vh; }

        .topbar {
            background:#00247c; color:#fff;
            padding:0 28px; height:58px;
            display:flex; align-items:center; justify-content:space-between;
            box-shadow:0 2px 8px rgba(0,0,0,0.18);
            position:sticky; top:0; z-index:100;
        }
        .topbar h1 { font-size:17px; font-weight:700; display:flex; align-items:center; gap:10px; }
        .topbar-right { display:flex; align-items:center; gap:10px; }

        .btn {
            display:inline-flex; align-items:center; gap:7px;
            padding:8px 16px; border:none; border-radius:7px;
            font-size:13px; font-weight:600; cursor:pointer;
            font-family:inherit; transition:all .18s; text-decoration:none;
        }
        .btn-primary  { background:#00247c; color:#fff; }
        .btn-primary:hover  { background:#001a5c; }
        .btn-success  { background:#28a745; color:#fff; }
        .btn-success:hover  { background:#1e7e34; }
        .btn-warning  { background:#ff9800; color:#fff; }
        .btn-warning:hover  { background:#e65100; }
        .btn-danger   { background:#dc3545; color:#fff; }
        .btn-danger:hover   { background:#b02a37; }
        .btn-outline  { background:#fff; color:#00247c; border:1.5px solid #00247c; }
        .btn-outline:hover  { background:#f0f4ff; }
        .btn-sm { padding:5px 11px; font-size:12px; border-radius:5px; }

        .page-body { max-width:1300px; margin:0 auto; padding:24px 20px; }

        .controls-bar {
            display:flex; align-items:center; gap:12px; flex-wrap:wrap;
            background:#fff; border-radius:10px;
            padding:14px 18px;
            box-shadow:0 1px 6px rgba(0,0,0,0.08);
            margin-bottom:18px;
        }
        .search-wrap { position:relative; flex:1; min-width:200px; max-width:340px; }
        .search-wrap i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#aaa; font-size:13px; }
        .search-wrap input {
            width:100%; padding:8px 10px 8px 32px;
            border:1.5px solid #e0e0e0; border-radius:7px;
            font-size:13px; font-family:inherit; outline:none; transition:border-color .18s;
        }
        .search-wrap input:focus { border-color:#00247c; }
        .house-count {
            background:#f0f4ff; color:#00247c;
            padding:6px 14px; border-radius:20px;
            font-size:13px; font-weight:600; white-space:nowrap;
        }

        #toast {
            position:fixed; bottom:28px; left:50%;
            transform:translateX(-50%) translateY(40px);
            background:#333; color:#fff; padding:11px 22px; border-radius:8px;
            font-size:13px; font-weight:500; opacity:0;
            transition:opacity .25s, transform .25s;
            z-index:9999; pointer-events:none; white-space:nowrap;
        }
        #toast.show    { opacity:1; transform:translateX(-50%) translateY(0); }
        #toast.success { background:#28a745; }
        #toast.error   { background:#dc3545; }

        .table-wrap {
            background:#fff; border-radius:10px;
            box-shadow:0 1px 6px rgba(0,0,0,0.08); overflow:hidden;
        }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        thead th {
            background:#00247c; color:#fff;
            padding:11px 14px; text-align:left;
            font-weight:600; font-size:12px;
            white-space:nowrap; cursor:pointer; user-select:none;
        }
        thead th:hover { background:#001a5c; }
        thead th.sort-asc::after  { content:' ↑'; color:#7ecfff; }
        thead th.sort-desc::after { content:' ↓'; color:#7ecfff; }
        thead th:last-child { cursor:default; }
        tbody tr { border-bottom:1px solid #f2f2f2; }
        tbody tr:hover { background:#f7f9ff; }
        tbody td { padding:10px 14px; vertical-align:middle; }
        .td-id    { color:#aaa; font-size:12px; width:50px; }
        .td-addr  { font-weight:600; color:#00247c; }
        .td-minor { color:#666; }
        .td-area  { color:#555; font-variant-numeric:tabular-nums; }
        .td-date  { color:#999; font-size:12px; white-space:nowrap; }
        .td-actions { white-space:nowrap; width:140px; }
        .empty-row td { text-align:center; padding:40px; color:#aaa; font-size:14px; }

        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.45); z-index:1000;
            align-items:center; justify-content:center;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background:#fff; border-radius:14px;
            width:92%; max-width:480px;
            box-shadow:0 12px 40px rgba(0,0,0,0.22);
            overflow:hidden; animation:modalIn .2s ease;
        }
        @keyframes modalIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-header {
            background:#00247c; color:#fff; padding:16px 22px;
            display:flex; align-items:center; justify-content:space-between;
        }
        .modal-header h2 { font-size:16px; font-weight:700; }
        .modal-close {
            background:rgba(255,255,255,0.15); border:none; border-radius:50%;
            width:30px; height:30px; color:#fff; font-size:18px; cursor:pointer;
            display:flex; align-items:center; justify-content:center; transition:background .18s;
        }
        .modal-close:hover { background:rgba(255,255,255,0.3); }
        .modal-body { padding:22px 22px 8px; }
        .form-group { margin-bottom:16px; }
        .form-group label {
            display:block; margin-bottom:6px;
            font-size:12px; font-weight:600; color:#555;
            text-transform:uppercase; letter-spacing:.4px;
        }
        .form-group input {
            width:100%; padding:9px 12px;
            border:1.5px solid #e0e0e0; border-radius:7px;
            font-size:14px; font-family:inherit; outline:none; transition:border-color .18s;
        }
        .form-group input:focus { border-color:#00247c; }
        .modal-footer { padding:14px 22px 20px; display:flex; gap:10px; justify-content:flex-end; }

        .confirm-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.45); z-index:1100;
            align-items:center; justify-content:center;
        }
        .confirm-overlay.open { display:flex; }
        .confirm-box {
            background:#fff; border-radius:12px; padding:28px 28px 22px;
            width:92%; max-width:380px;
            box-shadow:0 12px 40px rgba(0,0,0,0.2); text-align:center;
        }
        .confirm-box .confirm-icon { font-size:36px; margin-bottom:12px; }
        .confirm-box h3 { font-size:16px; margin-bottom:8px; color:#333; }
        .confirm-box p  { font-size:13px; color:#777; margin-bottom:20px; }
        .confirm-btns   { display:flex; gap:10px; justify-content:center; }
    </style>
</head>
<body>

<div class="topbar">
    <h1><i class="fas fa-home"></i> Manage Houses — Barangay Blue Ridge B</h1>
    <div class="topbar-right">
        <button class="btn btn-success" onclick="openAddPage()">
            <i class="fas fa-plus"></i> Add New House
        </button>
        <button class="btn btn-outline" onclick="loadHouses()">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
    </div>
</div>

<div class="page-body">
    <div class="controls-bar">
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search address or street…" oninput="render()">
        </div>
        <span class="house-count" id="houseCount">Loading…</span>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th onclick="sortBy('house_id')">ID</th>
                    <th onclick="sortBy('address')">Address</th>
                    <th onclick="sortBy('street_name')">Street</th>
                    <th onclick="sortBy('house_number')">House #</th>
                    <th onclick="sortBy('area_sqm')">Area (m²)</th>
                    <th onclick="sortBy('created_at')">Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="housesBody">
                <tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> Loading houses…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2><i class="fas fa-pen"></i> Edit House</h2>
            <button class="modal-close" onclick="closeEdit()">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Address *</label>
                <input type="text" id="editAddress" placeholder="e.g. 5 Twin Peaks Dr" required>
            </div>
            <div class="form-group">
                <label>House Number</label>
                <input type="text" id="editHouseNumber" placeholder="e.g. 5">
            </div>
            <div class="form-group">
                <label>Street Name</label>
                <input type="text" id="editStreetName" placeholder="e.g. Twin Peaks Dr">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeEdit()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEdit()"><i class="fas fa-save"></i> Save Changes</button>
        </div>
    </div>
</div>

<!-- Delete Confirm -->
<div class="confirm-overlay" id="deleteOverlay">
    <div class="confirm-box">
        <div class="confirm-icon">🗑️</div>
        <h3>Delete House?</h3>
        <p id="deleteMsg">This action cannot be undone.</p>
        <div class="confirm-btns">
            <button class="btn btn-outline" onclick="closeDelete()">Cancel</button>
            <button class="btn btn-danger" onclick="confirmDelete()"><i class="fas fa-trash"></i> Delete</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// ── IMPORTANT: adjust this path to match your project structure ──────────────
const HANDLER = '/Banwa/server/handlers/map/map_handler.php';
// If manage_houses.html is in the same folder as map_handler.php, use:
// const HANDLER = 'map_handler.php';

let allHouses   = [];
let sortCol     = 'house_id';
let sortDir     = 'asc';
let deleteTarget = null;

window.addEventListener('DOMContentLoaded', loadHouses);

async function loadHouses() {
    document.getElementById('housesBody').innerHTML =
        '<tr class="empty-row"><td colspan="7"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>';
    try {
        const fd = new FormData();
        fd.append('action', 'get_houses');
        const res  = await fetch(HANDLER, { method:'POST', body:fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Failed to load');
        allHouses = data.houses || [];
        render();
        toast(`Loaded ${allHouses.length} houses`, 'success');
    } catch(e) {
        document.getElementById('housesBody').innerHTML =
            `<tr class="empty-row"><td colspan="7"><i class="fas fa-exclamation-circle"></i> ${esc(e.message)}</td></tr>`;
        toast(e.message, 'error');
    }
}

function render() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();

    let rows = allHouses.filter(h =>
        !q ||
        (h.address      || '').toLowerCase().includes(q) ||
        (h.street_name  || '').toLowerCase().includes(q) ||
        (h.house_number || '').toLowerCase().includes(q)
    );

    // Sort
    rows.sort((a, b) => {
        let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
        if (sortCol === 'house_id' || sortCol === 'area_sqm') {
            va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
        } else if (sortCol === 'house_number') {
            va = parseInt(va) || 0; vb = parseInt(vb) || 0;
        } else if (sortCol === 'created_at') {
            va = new Date(va); vb = new Date(vb);
        } else {
            va = (va+'').toLowerCase(); vb = (vb+'').toLowerCase();
        }
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ?  1 : -1;
        return 0;
    });

    // Count badge
    const total = allHouses.length;
    document.getElementById('houseCount').textContent =
        rows.length === total ? `${total} houses` : `${rows.length} of ${total}`;

    // Sort indicators
    document.querySelectorAll('thead th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
    const cols = ['house_id','address','street_name','house_number','area_sqm','created_at'];
    const idx  = cols.indexOf(sortCol);
    if (idx >= 0) {
        document.querySelectorAll('thead th')[idx].classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }

    if (rows.length === 0) {
        document.getElementById('housesBody').innerHTML =
            '<tr class="empty-row"><td colspan="7">No houses match your search.</td></tr>';
        return;
    }

    document.getElementById('housesBody').innerHTML = rows.map(h => {
        const created = h.created_at ? new Date(h.created_at).toLocaleDateString('en-PH') : '—';
        const area    = h.area_sqm   ? parseFloat(h.area_sqm).toFixed(2) : '—';
        // Safe values for onclick attributes (apostrophes escaped)
        const safeAddr = (h.address      || '').replace(/'/g, "\\'");
        const safeHn   = (h.house_number || '').replace(/'/g, "\\'");
        const safeSt   = (h.street_name  || '').replace(/'/g, "\\'");
        return `
        <tr>
            <td class="td-id">${h.house_id}</td>
            <td class="td-addr">${esc(h.address) || '<span style="color:#ccc">—</span>'}</td>
            <td class="td-minor">${esc(h.street_name)  || '<span style="color:#ccc">—</span>'}</td>
            <td class="td-minor">${esc(h.house_number) || '<span style="color:#ccc">—</span>'}</td>
            <td class="td-area">${area}</td>
            <td class="td-date">${created}</td>
            <td class="td-actions">
                <button class="btn btn-warning btn-sm"
                    onclick="openEdit(${h.house_id},'${safeAddr}','${safeHn}','${safeSt}')">
                    <i class="fas fa-pen"></i> Edit
                </button>
                <button class="btn btn-danger btn-sm" style="margin-left:4px;"
                    onclick="openDelete(${h.house_id},'${safeAddr}')">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>`;
    }).join('');
}

function sortBy(col) {
    sortDir = (sortCol === col && sortDir === 'asc') ? 'desc' : 'asc';
    sortCol = col;
    render();
}

// ── Edit ─────────────────────────────────────────────────────────────────────
function openEdit(id, address, houseNum, street) {
    document.getElementById('editId').value          = id;
    document.getElementById('editAddress').value     = address;
    document.getElementById('editHouseNumber').value = houseNum;
    document.getElementById('editStreetName').value  = street;
    document.getElementById('editOverlay').classList.add('open');
    setTimeout(() => document.getElementById('editAddress').focus(), 80);
}
function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); }

async function saveEdit() {
    const id   = document.getElementById('editId').value;
    const addr = document.getElementById('editAddress').value.trim();
    if (!addr) { toast('Address is required', 'error'); return; }

    const fd = new FormData();
    fd.append('action',       'update_house');
    fd.append('house_id',     id);
    fd.append('address',      addr);
    fd.append('house_number', document.getElementById('editHouseNumber').value.trim());
    fd.append('street_name',  document.getElementById('editStreetName').value.trim());

    try {
        const res  = await fetch(HANDLER, { method:'POST', body:fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        closeEdit();
        toast('House updated successfully', 'success');
        loadHouses();
    } catch(e) { toast(e.message, 'error'); }
}

// ── Delete ────────────────────────────────────────────────────────────────────
function openDelete(id, address) {
    deleteTarget = id;
    document.getElementById('deleteMsg').textContent =
        `Delete "${address}"? This cannot be undone.`;
    document.getElementById('deleteOverlay').classList.add('open');
}
function closeDelete() {
    deleteTarget = null;
    document.getElementById('deleteOverlay').classList.remove('open');
}
async function confirmDelete() {
    if (!deleteTarget) return;
    const fd = new FormData();
    fd.append('action',   'delete_house');
    fd.append('house_id', deleteTarget);
    try {
        const res  = await fetch(HANDLER, { method:'POST', body:fd });
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        closeDelete();
        toast('House deleted', 'success');
        loadHouses();
    } catch(e) { toast(e.message, 'error'); }
}

// ── Add house (opens drawing tool) ───────────────────────────────────────────
function openAddPage() {
    window.open('add_house_simple.html', '_blank');
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(str) {
    return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3200);
}

// Close modals on backdrop click
document.getElementById('editOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeEdit();
});
document.getElementById('deleteOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDelete();
});
// Save on Enter in last field
document.getElementById('editStreetName').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveEdit();
});
</script>
</body>
</html>
